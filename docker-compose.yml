services:
  backend:
    build:
      context: ./backend

    container_name: uptime-backend

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    volumes:
      - ./backend:/app

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000

    container_name: uptime-frontend

    depends_on:
      - backend

    ports:
      - "5173:80"

    restart: unless-stopped